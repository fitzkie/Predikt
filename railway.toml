[build]
builder = "NIXPACKS"

[deploy]
startCommand = "mkdir -p .next/standalone/.next && cp -R .next/static .next/standalone/.next/static && cp -R public .next/standalone/public && HOSTNAME=0.0.0.0 PORT=${PORT:-3000} node .next/standalone/server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
